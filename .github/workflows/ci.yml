name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v1
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build -- -j2
      - name: Run tests
        run: ctest --test-dir build --output-on-failure
